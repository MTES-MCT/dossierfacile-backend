<!-- Metadata modal for displaying file technical metadata -->
<div th:fragment="metadataModal(modalId, title, metadataOfFiles)"
     class="modal fade" th:id="${modalId}" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content">
            <div class="modal-header px-4 py-3 align-items-center">
                <h5 class="modal-title font-weight-bold" style="font-size: 1.1rem" th:text="${title}"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close">
                </button>
            </div>
            <div class="modal-body text-left" style="background-color: #f8f9fa;">
                <div th:if="${metadataOfFiles == null or metadataOfFiles.isEmpty()}"
                     class="alert alert-warning">
                    Aucune métadonnée technique trouvée.
                </div>
                <div th:each="metadataItem, index : ${metadataOfFiles}"
                     class="card mb-3 shadow-sm">
                    <div class="card-header bg-white font-weight-bold text-primary">
                        <i class="fa fa-file-pdf-o"></i> <span
                            th:text="'Fichier : ' + ${metadataItem.fileName}"></span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover table-sm mb-0"
                                   style="font-size: 13px;">
                                <thead class="thead-light">
                                <tr>
                                    <th style="width: 40%">Clé</th>
                                    <th style="width: 60%">Valeur</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="entry : ${metadataItem.metadata}">
                                    <td style="word-break: break-word;"><span
                                            th:text="${entry.key}"
                                            class="text-secondary font-weight-bold"></span></td>
                                    <td style="word-break: break-all;"><span
                                            th:text="${entry.value}"></span></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer
                </button>
            </div>
        </div>
    </div>
</div>
